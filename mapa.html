<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bathys - Interaktywna mapa</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="mapa.css" />
    <link rel="stylesheet" href="responsive-mapa.css" />
    <link rel="icon" type="image/png" href="icon.png" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <a href="index.html" class="logo">Bath<span>ys</span></a>
      <div class="header-right">
        <span class="header-tag">Interaktywna mapa</span>
        <a href="wybor.html" class="header-back">← Wróć do wyboru</a>
      </div>
    </header>

    <!-- GŁÓWNY UKŁAD -->
    <div class="main-layout">
      <!-- PANEL BOCZNY -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2 class="sidebar-title">Eksploruj gatunki</h2>
          <p class="sidebar-sub">
            Dane z bazy OBIS · Ocean Biodiversity Information System
          </p>
        </div>

        <!-- WYSZUKIWARKA -->
        <div class="search-section">
          <p class="section-label">Szukaj gatunku</p>
          <div class="search-input-wrapper">
            <span class="search-icon"
              ><i data-lucide="search" class="search-icon"></i
            ></span>
            <input
              type="text"
              id="search-input"
              placeholder="np. Balaenoptera, Octopus..."
            />
          </div>
          <button id="search-btn">Szukaj na mapie</button>

          <div
            class="history-section"
            id="history-section"
            style="display: none"
          >
            <p class="section-label">Ostatnie wyszukiwania</p>
            <div id="history-list"></div>
          </div>

          <button id="clear-btn">Wyczyść mapę</button>

          <button id="csv-btn">⬇ Pobierz CSV</button>

          <div class="toggle-section">
            <p class="section-label">Widok mapy</p>
            <div class="toggle-wrapper">
              <button class="toggle-btn active" id="btn-punkty">Punkty</button>
              <button class="toggle-btn" id="btn-heatmapa">Heatmapa</button>
              <button class="toggle-btn" id="btn-timeline">Timeline</button>
            </div>
          </div>
        </div>

        

        <!-- ANIMACJA CZASOWA -->
        <div
          class="timeline-section"
          id="timeline-section"
          style="display: none"
        >
          <p class="section-label">Animacja czasowa</p>
          <div class="timeline-controls">
            <button id="timeline-play" title="Play">▶</button>
            <button id="timeline-stop" title="Stop">■</button>
          </div>
          <div class="timeline-slider-wrapper">
            <span id="timeline-year-label" class="timeline-year">—</span>
            <input
              type="range"
              id="timeline-slider"
              min="1900"
              max="2025"
              value="2025"
              step="1"
            />
          </div>
          <div class="timeline-range">
            <span id="timeline-min">—</span>
            <span id="timeline-max">—</span>
          </div>
          <p class="timeline-count" id="timeline-count"></p>
        </div>

        <!-- PORÓWNANIE -->
        <div class="compare-section">
          <p class="section-label">Porównaj gatunki</p>
          <div class="compare-input-wrapper">
            <span
              class="compare-dot"
              style="background: rgb(47, 156, 153)"
            ></span>
            <input
              type="text"
              id="compare-input-1"
              placeholder="Gatunek 1 np. Delphinus"
            />
          </div>
          <div class="compare-input-wrapper">
            <span
              class="compare-dot"
              style="background: rgb(255, 140, 0)"
            ></span>
            <input
              type="text"
              id="compare-input-2"
              placeholder="Gatunek 2 np. Carcharodon"
            />
          </div>
          <button id="compare-btn">Porównaj na mapie</button>
          <button id="compare-clear-btn">Wyczyść porównanie</button>
        </div>

        <!-- LEGENDA -->
        <div class="legend-section" id="legend-section" style="display: none">
          <p class="section-label">Legenda</p>
          <div class="legend-list" id="legend-list"></div>
        </div>

        <!-- FILTRY -->
        <div class="filters-section">
          <p class="section-label">Filtry</p>
          <div class="filter-group">
            <label class="filter-label">Region oceaniczny</label>
            <select class="filter-select" id="filter-region">
              <option value="">Cały świat</option>
              <option value="arctic">Arktyka</option>
              <option value="north_atlantic">Atlantyk Północny</option>
              <option value="south_atlantic">Atlantyk Południowy</option>
              <option value="north_pacific">Pacyfik Północny</option>
              <option value="south_pacific">Pacyfik Południowy</option>
              <option value="indian">Ocean Indyjski</option>
              <option value="mediterranean">Morze Śródziemne</option>
              <option value="baltic">Morze Bałtyckie</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label">Limit wyników</label>
            <select class="filter-select" id="filter-limit">
              <option value="50">50 rekordów</option>
              <option value="100" selected>100 rekordów</option>
              <option value="250">250 rekordów</option>
              <option value="500">500 rekordów</option>
              <option value="1000">1000 rekordów</option>
              <option value="5000">5000 rekordów (wolno)</option>
              <option value="10000">10000 rekordów (wolno)</option>
            </select>
          </div>
        </div>

        <!-- STATUS -->
        <div class="status-section">
          <p id="status-text">Wpisz nazwę gatunku i kliknij "Szukaj".</p>
        </div>

        <!-- WYNIKI -->
        <div class="results-section">
          <p id="results-count"></p>
          <p id="visible-count"></p>
          <div id="results-list"></div>
        </div>
      </aside>

      <!-- MAPA -->
      <div id="map"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="mapa.js"></script>
    <script src="transitions.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
