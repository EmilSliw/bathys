<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bathys — 404</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Josefin+Sans:wght@400;600&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a2240;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Josefin Sans', sans-serif;
            text-align: center;
            gap: 1.5rem;
            animation: pageIn 0.4s ease forwards;
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            position: fixed;
            top: 1.5rem;
            left: 2rem;
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
        }
        .logo span { color: rgb(47, 156, 153); }

        .error-code {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(6rem, 20vw, 12rem);
            color: rgba(255, 255, 255, 0.06);
            line-height: 1;
            user-select: none;
        }

        .error-icon { font-size: 3rem; }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: white;
            font-style: italic;
        }

        p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            max-width: 360px;
            line-height: 1.7;
        }

        .btn {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.8rem 2rem;
            background: rgb(8, 53, 150);
            color: white;
            text-decoration: none;
            font-family: 'Josefin Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .btn:hover { background: rgb(47, 156, 153); }

        /* Bioluminescencja w tle */
        .bio-punkt {
            position: fixed;
            border-radius: 50%;
            background: rgb(47, 156, 153);
            pointer-events: none;
            animation: bio ease-in-out infinite;
            filter: blur(1px);
        }

        @keyframes bio {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.5; transform: scale(1.2); box-shadow: 0 0 8px 2px rgba(47,156,153,0.4); }
        }
    </style>
</head>
<body>

    <a href="index.html" class="logo">Bath<span>ys</span></a>

    <div class="error-code">404</div>
    <div class="error-icon">🤿</div>
    <h1>Zbyt głęboko.</h1>
    <p>Ta strona nie istnieje lub została przeniesiona. Może zatopiła się na dno?</p>
    <a href="index.html" class="btn">Wróć na powierzchnię</a>

    <script>
        // Bioluminescencja
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.classList.add('bio-punkt');
            const size = Math.random() * 4 + 2;
            p.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                animation-delay: ${Math.random() * 4}s;
                animation-duration: ${Math.random() * 3 + 2}s;
            `;
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
